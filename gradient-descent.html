<h1>Geometric Overview of Gradient Descent</h1>

<p>
Gradient descent can be understood geometrically as moving in the direction
of steepest descent of the loss function.
</p>

<h2>Quadratic Loss</h2>

<p>
L(w) = (1/2) wᵀAw − bᵀw
</p>

<p>
The update rule becomes
</p>

<p>
w_{t+1} = w_t − η∇L
</p>
